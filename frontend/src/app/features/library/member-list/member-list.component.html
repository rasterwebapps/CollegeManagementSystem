<div class="list-container">
  <div class="list-header">
    <h2>Library Members</h2>
  </div>

  <mat-table [dataSource]="service.members()" class="list-table">

    <ng-container matColumnDef="membershipNumber">
      <mat-header-cell *matHeaderCellDef>Membership Number</mat-header-cell>
      <mat-cell *matCellDef="let row">{{ row.membershipNumber }}</mat-cell>
    </ng-container>

    <ng-container matColumnDef="memberType">
      <mat-header-cell *matHeaderCellDef>Member Type</mat-header-cell>
      <mat-cell *matCellDef="let row">{{ row.memberType }}</mat-cell>
    </ng-container>

    <ng-container matColumnDef="maxBooksAllowed">
      <mat-header-cell *matHeaderCellDef>Max Books Allowed</mat-header-cell>
      <mat-cell *matCellDef="let row">{{ row.maxBooksAllowed }}</mat-cell>
    </ng-container>

    <ng-container matColumnDef="status">
      <mat-header-cell *matHeaderCellDef>Status</mat-header-cell>
      <mat-cell *matCellDef="let row">{{ row.status }}</mat-cell>
    </ng-container>

    <mat-header-row *matHeaderRowDef="displayedColumns" />
    <mat-row *matRowDef="let row; columns: displayedColumns" />
  </mat-table>
</div>
