<div class="list-container">
  <div class="list-header">
    <h2>Vehicles</h2>
  </div>

  <mat-table [dataSource]="service.vehicles()" class="list-table">

    <ng-container matColumnDef="type">
      <mat-header-cell *matHeaderCellDef>Type</mat-header-cell>
      <mat-cell *matCellDef="let row">{{ row.type }}</mat-cell>
    </ng-container>

    <ng-container matColumnDef="registrationNumber">
      <mat-header-cell *matHeaderCellDef>Registration Number</mat-header-cell>
      <mat-cell *matCellDef="let row">{{ row.registrationNumber }}</mat-cell>
    </ng-container>

    <ng-container matColumnDef="capacity">
      <mat-header-cell *matHeaderCellDef>Capacity</mat-header-cell>
      <mat-cell *matCellDef="let row">{{ row.capacity }}</mat-cell>
    </ng-container>

    <ng-container matColumnDef="driverName">
      <mat-header-cell *matHeaderCellDef>Driver Name</mat-header-cell>
      <mat-cell *matCellDef="let row">{{ row.driverName }}</mat-cell>
    </ng-container>

    <ng-container matColumnDef="status">
      <mat-header-cell *matHeaderCellDef>Status</mat-header-cell>
      <mat-cell *matCellDef="let row">{{ row.status }}</mat-cell>
    </ng-container>

    <mat-header-row *matHeaderRowDef="displayedColumns" />
    <mat-row *matRowDef="let row; columns: displayedColumns" />
  </mat-table>
</div>
