<div class="list-container">
  <div class="list-header">
    <h2>Companies</h2>
  </div>

  <mat-table [dataSource]="service.companies()" class="list-table">

    <ng-container matColumnDef="name">
      <mat-header-cell *matHeaderCellDef>Name</mat-header-cell>
      <mat-cell *matCellDef="let row">{{ row.name }}</mat-cell>
    </ng-container>

    <ng-container matColumnDef="industry">
      <mat-header-cell *matHeaderCellDef>Industry</mat-header-cell>
      <mat-cell *matCellDef="let row">{{ row.industry }}</mat-cell>
    </ng-container>

    <ng-container matColumnDef="contactPerson">
      <mat-header-cell *matHeaderCellDef>Contact Person</mat-header-cell>
      <mat-cell *matCellDef="let row">{{ row.contactPerson }}</mat-cell>
    </ng-container>

    <ng-container matColumnDef="status">
      <mat-header-cell *matHeaderCellDef>Status</mat-header-cell>
      <mat-cell *matCellDef="let row">{{ row.status }}</mat-cell>
    </ng-container>

    <mat-header-row *matHeaderRowDef="displayedColumns" />
    <mat-row *matRowDef="let row; columns: displayedColumns" />
  </mat-table>
</div>
