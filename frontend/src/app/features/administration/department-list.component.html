<div class="page-container">
  <div class="page-header">
    <h1>Departments</h1>
    <button mat-flat-button color="primary" (click)="openDialog()">
      <mat-icon>add</mat-icon> New Department
    </button>
  </div>

  <table mat-table [dataSource]="items()" class="mat-elevation-z1">
    <ng-container matColumnDef="code">
      <th mat-header-cell *matHeaderCellDef>Code</th>
      <td mat-cell *matCellDef="let row">{{ row.code }}</td>
    </ng-container>
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Name</th>
      <td mat-cell *matCellDef="let row">{{ row.name }}</td>
    </ng-container>
    <ng-container matColumnDef="headName">
      <th mat-header-cell *matHeaderCellDef>Head</th>
      <td mat-cell *matCellDef="let row">{{ row.headName }}</td>
    </ng-container>
    <ng-container matColumnDef="active">
      <th mat-header-cell *matHeaderCellDef>Active</th>
      <td mat-cell *matCellDef="let row">{{ row.active ? 'Yes' : 'No' }}</td>
    </ng-container>
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let row">
        <button mat-icon-button matTooltip="Edit" (click)="openDialog(row)"><mat-icon>edit</mat-icon></button>
        <button mat-icon-button matTooltip="Delete" (click)="deleteItem(row)"><mat-icon>delete</mat-icon></button>
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>
