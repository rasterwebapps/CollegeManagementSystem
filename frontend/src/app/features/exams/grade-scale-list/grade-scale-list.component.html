<div class="list-container">
  <div class="list-header">
    <h2>Grade Scales</h2>
  </div>

  <mat-table [dataSource]="service.gradeScales()" class="list-table">

    <ng-container matColumnDef="grade">
      <mat-header-cell *matHeaderCellDef>Grade</mat-header-cell>
      <mat-cell *matCellDef="let row">{{ row.grade }}</mat-cell>
    </ng-container>

    <ng-container matColumnDef="minPercentage">
      <mat-header-cell *matHeaderCellDef>Min Percentage</mat-header-cell>
      <mat-cell *matCellDef="let row">{{ row.minPercentage }}</mat-cell>
    </ng-container>

    <ng-container matColumnDef="maxPercentage">
      <mat-header-cell *matHeaderCellDef>Max Percentage</mat-header-cell>
      <mat-cell *matCellDef="let row">{{ row.maxPercentage }}</mat-cell>
    </ng-container>

    <ng-container matColumnDef="gradePoint">
      <mat-header-cell *matHeaderCellDef>Grade Point</mat-header-cell>
      <mat-cell *matCellDef="let row">{{ row.gradePoint }}</mat-cell>
    </ng-container>

    <mat-header-row *matHeaderRowDef="displayedColumns" />
    <mat-row *matRowDef="let row; columns: displayedColumns" />
  </mat-table>
</div>
