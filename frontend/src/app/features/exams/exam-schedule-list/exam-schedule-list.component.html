<div class="list-container">
  <div class="list-header">
    <h2>Exam Schedules</h2>
  </div>

  <mat-table [dataSource]="service.examSchedules()" class="list-table">

    <ng-container matColumnDef="examType">
      <mat-header-cell *matHeaderCellDef>Exam Type</mat-header-cell>
      <mat-cell *matCellDef="let row">{{ row.examType }}</mat-cell>
    </ng-container>

    <ng-container matColumnDef="date">
      <mat-header-cell *matHeaderCellDef>Date</mat-header-cell>
      <mat-cell *matCellDef="let row">{{ row.date }}</mat-cell>
    </ng-container>

    <ng-container matColumnDef="duration">
      <mat-header-cell *matHeaderCellDef>Duration</mat-header-cell>
      <mat-cell *matCellDef="let row">{{ row.duration }}</mat-cell>
    </ng-container>

    <ng-container matColumnDef="maxMarks">
      <mat-header-cell *matHeaderCellDef>Max Marks</mat-header-cell>
      <mat-cell *matCellDef="let row">{{ row.maxMarks }}</mat-cell>
    </ng-container>

    <ng-container matColumnDef="status">
      <mat-header-cell *matHeaderCellDef>Status</mat-header-cell>
      <mat-cell *matCellDef="let row">{{ row.status }}</mat-cell>
    </ng-container>

    <mat-header-row *matHeaderRowDef="displayedColumns" />
    <mat-row *matRowDef="let row; columns: displayedColumns" />
  </mat-table>
</div>
